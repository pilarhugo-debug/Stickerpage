<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>sticker sheet maker ✿</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pk0:#fff0f7;--pk1:#fce4ec;--pk2:#f8bbd0;--pk3:#f48fb1;
  --pk4:#e91e8c;--pk5:#c2185b;--pk6:#880e4f;
  --lil:#f3e5f5;--lil2:#ce93d8;
}
body{font-family:'Nunito',sans-serif;background:#fce4ec;min-height:100vh;color:#5c1a3a}
h1{font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,4vw,2.6rem);color:var(--pk5);text-align:center;padding:2rem 1rem 0.3rem}
.subtitle{text-align:center;color:var(--pk4);font-size:14px;font-weight:700;margin-bottom:1.5rem}

.app{display:grid;grid-template-columns:320px 1fr;gap:0;min-height:calc(100vh - 110px)}

/* ---- LEFT PANEL ---- */
.panel{background:#fff8fb;border-right:2px solid var(--pk2);padding:1.25rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto;max-height:calc(100vh - 110px)}

.upload-zone{border:2.5px dashed var(--pk3);border-radius:18px;background:var(--pk0);padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;flex-shrink:0}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--pk4);background:#fff0f7}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone .ico{font-size:2rem;display:block;margin-bottom:.4rem}
.upload-zone h3{font-size:14px;font-weight:800;color:var(--pk5)}
.upload-zone p{font-size:11px;color:var(--pk3);font-weight:600;margin-top:.2rem}

.section-title{font-size:11px;font-weight:800;color:var(--pk4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:.3rem}

/* settings */
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;font-weight:800;color:var(--pk4);text-transform:uppercase;letter-spacing:.7px}
.field select,.field input[type=number]{appearance:none;-webkit-appearance:none;background:#fff0f7;border:1.5px solid var(--pk2);border-radius:50px;padding:7px 14px;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;color:var(--pk5);outline:none;width:100%}
.field select:focus,.field input:focus{border-color:var(--pk4)}
.range-row{display:flex;align-items:center;gap:8px}
.range-row input[type=range]{flex:1;accent-color:var(--pk4);height:5px;cursor:pointer}
.range-row span{font-size:13px;font-weight:800;color:var(--pk5);min-width:30px;text-align:right}
.toggle-row{display:flex;align-items:center;gap:10px;padding:.2rem 0}
.toggle-row label.lbl{font-size:13px;font-weight:700;color:var(--pk5);cursor:pointer}
.toggle{position:relative;width:38px;height:21px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.tslider{position:absolute;inset:0;background:var(--pk2);border-radius:50px;cursor:pointer;transition:background .2s}
.tslider::before{content:'';position:absolute;width:15px;height:15px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked+.tslider{background:var(--pk4)}
.toggle input:checked+.tslider::before{transform:translateX(17px)}

/* thumb list */
.thumb-section{flex:1;overflow-y:auto;min-height:0}
.thumb-list{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.thumb{position:relative;background:#fff;border-radius:12px;border:2px solid var(--pk2);overflow:hidden;aspect-ratio:1;cursor:grab;transition:transform .15s,border-color .2s}
.thumb:hover{border-color:var(--pk4);transform:scale(1.04)}
.thumb.dragging{opacity:.5;border-color:var(--pk4)}
.thumb.drag-over-item{border-color:var(--pk4);border-style:dashed}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.thumb .del{position:absolute;top:4px;right:4px;background:var(--pk4);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;font-weight:900;line-height:1}
.thumb:hover .del{opacity:1}
.thumb .hd-badge{position:absolute;bottom:4px;left:4px;background:#9c27b0cc;color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:50px}
.thumb .num{position:absolute;top:4px;left:4px;background:#e91e8ccc;color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:50px}
.empty-thumbs{text-align:center;padding:1.5rem .5rem;color:var(--pk3);font-size:13px;font-weight:600;grid-column:1/-1}

.gen-btn{width:100%;background:var(--pk4);color:#fff;border:none;border-radius:50px;padding:13px 1rem;font-family:'Fredoka One',cursive;font-size:18px;cursor:pointer;transition:transform .1s,background .2s;flex-shrink:0;letter-spacing:.5px}
.gen-btn:hover{background:var(--pk5);transform:translateY(-1px)}
.gen-btn:active{transform:scale(.98)}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.prog-wrap{background:var(--pk1);border-radius:50px;overflow:hidden;height:10px;display:none}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--pk3),var(--pk4));border-radius:50px;transition:width .3s;width:0}
.prog-lbl{font-size:11px;font-weight:700;color:var(--pk4);text-align:center;display:none;margin-top:4px}

/* ---- RIGHT PANEL: PREVIEW ---- */
.preview-panel{background:#e8d5e0;display:flex;flex-direction:column;overflow:hidden}
.preview-toolbar{background:#fff8fb;border-bottom:1.5px solid var(--pk2);padding:.6rem 1rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.preview-toolbar span{font-size:12px;font-weight:800;color:var(--pk4);text-transform:uppercase;letter-spacing:.7px}
.tb-btn{background:var(--pk0);border:1.5px solid var(--pk2);border-radius:50px;padding:5px 14px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--pk5);cursor:pointer;transition:border-color .15s}
.tb-btn:hover{border-color:var(--pk4)}
.tb-btn.active{background:var(--pk4);color:#fff;border-color:var(--pk4)}
.page-nav{display:flex;align-items:center;gap:6px;margin-left:auto}
.page-nav button{background:var(--pk0);border:1.5px solid var(--pk2);border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;font-weight:900;color:var(--pk5);display:flex;align-items:center;justify-content:center;transition:border-color .15s}
.page-nav button:hover{border-color:var(--pk4)}
.page-nav button:disabled{opacity:.3;cursor:not-allowed}
.page-info{font-size:12px;font-weight:800;color:var(--pk5);min-width:70px;text-align:center}

.preview-scroll{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:2rem}
.page-canvas-wrap{position:relative;background:#fff;box-shadow:0 4px 32px #00000022;border-radius:4px;overflow:hidden}
canvas#previewCanvas{display:block;cursor:default}

/* sticker drag overlay on canvas */
.sticker-overlay{position:absolute;inset:0;pointer-events:none}
.sticker-overlay.active{pointer-events:all}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(6px);background:var(--pk5);color:#fff;padding:9px 22px;border-radius:50px;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:700px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .panel{max-height:none;border-right:none;border-bottom:2px solid var(--pk2)}
}
</style>
</head>
<body>
<h1>✿ sticker sheet maker ✿</h1>
<p class="subtitle">sube imágenes, acomódalas y genera tu hoja lista para imprimir ♡</p>

<div class="app">
<!-- LEFT PANEL -->
<div class="panel">
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*" multiple/>
    <span class="ico">🌸</span>
    <h3>arrastra imágenes aquí</h3>
    <p>o click para elegir • múltiples</p>
  </div>

  <div>
    <div class="section-title">configuración</div>
    <div style="display:flex;flex-direction:column;gap:.6rem">
      <div class="field">
        <label>tamaño de página</label>
        <select id="pageSize">
          <option value="a4">A4 (21 × 29.7 cm)</option>
          <option value="letter">Carta (21.6 × 27.9 cm)</option>
          <option value="a5">A5 (14.8 × 21 cm)</option>
        </select>
      </div>
      <div class="field">
        <label>columnas por fila</label>
        <select id="cols">
          <option value="2">2 columnas (stickers grandes)</option>
          <option value="3" selected>3 columnas</option>
          <option value="4">4 columnas</option>
          <option value="5">5 columnas (mini stickers)</option>
        </select>
      </div>
      <div class="field">
        <label>forma del sticker</label>
        <select id="shape">
          <option value="square">cuadrado</option>
          <option value="rounded">redondeado</option>
          <option value="circle">círculo</option>
        </select>
      </div>
      <div class="field">
        <label>fondo del PDF</label>
        <select id="bgColor">
          <option value="white">blanco</option>
          <option value="pink">rosita ♡</option>
          <option value="cream">crema</option>
        </select>
      </div>
      <div class="field">
        <label>margen entre stickers (mm)</label>
        <div class="range-row">
          <input type="range" id="gap" min="2" max="20" value="8" step="1"/>
          <span id="gapVal">8</span>
        </div>
      </div>
      <div class="toggle-row">
        <label class="toggle"><input type="checkbox" id="upscaleToggle" checked/><span class="tslider"></span></label>
        <label class="lbl" for="upscaleToggle">✦ mejorar calidad automáticamente</label>
      </div>
    </div>
  </div>

  <div class="thumb-section">
    <div class="section-title">imágenes (<span id="imgCount">0</span>) — arrastra para reordenar</div>
    <div class="thumb-list" id="thumbList">
      <div class="empty-thumbs">sube imágenes para comenzar 🌷</div>
    </div>
  </div>

  <button class="gen-btn" id="genBtn" onclick="generatePDF()">🌸 descargar PDF</button>
  <div class="prog-wrap" id="progWrap"><div class="prog-bar" id="progBar"></div></div>
  <p class="prog-lbl" id="progLbl"></p>
</div>

<!-- RIGHT PANEL: PREVIEW -->
<div class="preview-panel">
  <div class="preview-toolbar">
    <span>vista previa</span>
    <button class="tb-btn" onclick="refreshPreview()">↻ actualizar</button>
    <div class="page-nav">
      <button id="prevPage" onclick="changePage(-1)" disabled>‹</button>
      <span class="page-info" id="pageInfo">pág 1 / 1</span>
      <button id="nextPage" onclick="changePage(1)" disabled>›</button>
    </div>
  </div>
  <div class="preview-scroll" id="previewScroll">
    <div class="page-canvas-wrap" id="canvasWrap">
      <canvas id="previewCanvas"></canvas>
      <div class="sticker-overlay active" id="stickerOverlay"></div>
    </div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const { jsPDF } = window.jspdf;

// State
let images = []; // {id, dataUrl, processedUrl, upscaled}
let currentPage = 0;
let totalPages = 1;
let layout = []; // per page: [{imgIdx, x, y, w, h}] in mm
let dragSrcIdx = null;
let SCALE = 3; // px per mm for preview

// Page sizes in mm
const PAGE_SIZES = { a4:[210,297], letter:[215.9,279.4], a5:[148,210] };
const BG_COLORS = { white:'#ffffff', pink:'#fce4ec', cream:'#fffde7' };

// --- upload ---
const zone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
zone.addEventListener('dragover', e=>{e.preventDefault();zone.classList.add('drag-over')});
zone.addEventListener('dragleave', ()=>zone.classList.remove('drag-over'));
zone.addEventListener('drop', e=>{e.preventDefault();zone.classList.remove('drag-over');handleFiles([...e.dataTransfer.files])});
fileInput.addEventListener('change', ()=>handleFiles([...fileInput.files]));

document.getElementById('gap').addEventListener('input', function(){
  document.getElementById('gapVal').textContent = this.value;
  refreshPreview();
});
['pageSize','cols','shape','bgColor'].forEach(id=>{
  document.getElementById(id).addEventListener('change', refreshPreview);
});

function handleFiles(files){
  const imgs = files.filter(f=>f.type.startsWith('image/'));
  if(!imgs.length){showToast('solo imágenes por favor ♡');return}
  let loaded = 0;
  imgs.forEach(file=>{
    const reader = new FileReader();
    reader.onload = e=>{
      images.push({id: Date.now()+Math.random(), dataUrl: e.target.result, processedUrl: null, upscaled: false});
      loaded++;
      if(loaded===imgs.length){renderThumbs();refreshPreview()}
    };
    reader.readAsDataURL(file);
  });
}

// --- thumbnails with drag-to-reorder ---
function renderThumbs(){
  const list = document.getElementById('thumbList');
  document.getElementById('imgCount').textContent = images.length;
  if(!images.length){
    list.innerHTML = '<div class="empty-thumbs">sube imágenes para comenzar 🌷</div>';
    return;
  }
  list.innerHTML = images.map((img,i)=>`
    <div class="thumb" draggable="true" data-idx="${i}" id="thumb-${img.id}">
      <img src="${img.dataUrl}" alt="sticker ${i+1}"/>
      ${img.upscaled?'<span class="hd-badge">✦ HD</span>':''}
      <span class="num">${i+1}</span>
      <button class="del" onclick="removeImg(${i},event)">✕</button>
    </div>
  `).join('');
  list.querySelectorAll('.thumb').forEach(el=>{
    el.addEventListener('dragstart', e=>{
      dragSrcIdx = parseInt(el.dataset.idx);
      el.classList.add('dragging');
    });
    el.addEventListener('dragend', ()=>{
      el.classList.remove('dragging');
      list.querySelectorAll('.thumb').forEach(t=>t.classList.remove('drag-over-item'));
    });
    el.addEventListener('dragover', e=>{
      e.preventDefault();
      list.querySelectorAll('.thumb').forEach(t=>t.classList.remove('drag-over-item'));
      el.classList.add('drag-over-item');
    });
    el.addEventListener('drop', e=>{
      e.preventDefault();
      const targetIdx = parseInt(el.dataset.idx);
      if(dragSrcIdx!==null && dragSrcIdx!==targetIdx){
        const moved = images.splice(dragSrcIdx,1)[0];
        images.splice(targetIdx,0,moved);
        renderThumbs();
        refreshPreview();
      }
    });
  });
}

function removeImg(idx, e){
  e.stopPropagation();
  images.splice(idx,1);
  renderThumbs();
  refreshPreview();
}

// --- layout computation ---
function computeLayout(){
  const cols = parseInt(document.getElementById('cols').value);
  const pageSizeKey = document.getElementById('pageSize').value;
  const gap = parseInt(document.getElementById('gap').value);
  const [pgW, pgH] = PAGE_SIZES[pageSizeKey];
  const margin = 10;
  const availW = pgW - margin*2;
  const stickerW = (availW - gap*(cols-1)) / cols;
  const stickerH = stickerW; // square stickers
  const rowH = stickerH + gap;
  const availH = pgH - margin*2;
  const rows = Math.max(1, Math.floor((availH + gap) / rowH));
  const perPage = rows * cols;

  layout = [];
  if(!images.length){totalPages=1;return}
  totalPages = Math.ceil(images.length / perPage);

  for(let p=0; p<totalPages; p++){
    const page = [];
    const start = p*perPage;
    for(let i=start; i<Math.min(start+perPage, images.length); i++){
      const idx = i - start;
      const col = idx % cols;
      const row = Math.floor(idx / cols);
      page.push({
        imgIdx: i,
        x: margin + col*(stickerW+gap),
        y: margin + row*(stickerH+gap),
        w: stickerW,
        h: stickerH
      });
    }
    layout.push(page);
  }
}

// --- preview rendering ---
async function refreshPreview(){
  computeLayout();
  if(currentPage >= totalPages) currentPage = totalPages-1;
  if(currentPage < 0) currentPage = 0;
  updatePageNav();
  await renderPagePreview(currentPage);
  renderStickerOverlay();
}

function updatePageNav(){
  document.getElementById('pageInfo').textContent = `pág ${currentPage+1} / ${totalPages}`;
  document.getElementById('prevPage').disabled = currentPage<=0;
  document.getElementById('nextPage').disabled = currentPage>=totalPages-1;
}

function changePage(dir){
  currentPage += dir;
  if(currentPage<0)currentPage=0;
  if(currentPage>=totalPages)currentPage=totalPages-1;
  updatePageNav();
  renderPagePreview(currentPage);
  renderStickerOverlay();
}

async function renderPagePreview(pageIdx){
  const pageSizeKey = document.getElementById('pageSize').value;
  const bgColor = document.getElementById('bgColor').value;
  const shape = document.getElementById('shape').value;
  const [pgW, pgH] = PAGE_SIZES[pageSizeKey];

  // fit to available space
  const scroll = document.getElementById('previewScroll');
  const availW = scroll.clientWidth - 64;
  const availH = scroll.clientHeight - 64;
  SCALE = Math.min(availW/pgW, availH/pgH, 3.5);
  const canvW = Math.round(pgW*SCALE);
  const canvH = Math.round(pgH*SCALE);

  const canvas = document.getElementById('previewCanvas');
  canvas.width = canvW;
  canvas.height = canvH;
  const wrap = document.getElementById('canvasWrap');
  wrap.style.width = canvW+'px';
  wrap.style.height = canvH+'px';

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvW,canvH);

  // background
  ctx.fillStyle = BG_COLORS[bgColor];
  ctx.fillRect(0,0,canvW,canvH);

  // stickers
  const page = layout[pageIdx] || [];
  for(const slot of page){
    const img = images[slot.imgIdx];
    if(!img) continue;
    const px = slot.x*SCALE, py = slot.y*SCALE, pw = slot.w*SCALE, ph = slot.h*SCALE;
    await drawStickerOnCanvas(ctx, img.dataUrl, px, py, pw, ph, shape);
  }

  // footer
  ctx.font = `${Math.round(7*SCALE*0.4)}px Nunito, sans-serif`;
  ctx.fillStyle = '#f48fb1';
  ctx.textAlign = 'center';
  ctx.fillText(`sticker sheet  •  pág ${pageIdx+1} / ${totalPages}`, canvW/2, canvH - 6*SCALE*0.4);
}

function drawStickerOnCanvas(ctx, dataUrl, x, y, w, h, shape){
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>{
      ctx.save();
      // clip shape
      ctx.beginPath();
      if(shape==='circle'){
        ctx.arc(x+w/2, y+h/2, Math.min(w,h)/2, 0, Math.PI*2);
      } else if(shape==='rounded'){
        const r = Math.min(w,h)*0.12;
        ctx.moveTo(x+r,y);
        ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
        ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
        ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
        ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
      } else {
        ctx.rect(x,y,w,h);
      }
      ctx.closePath();
      ctx.clip();
      // center-crop
      const iw = img.naturalWidth, ih = img.naturalHeight;
      const scale = Math.max(w/iw, h/ih);
      const sw = iw*scale, sh = ih*scale;
      const sx = x+(w-sw)/2, sy = y+(h-sh)/2;
      ctx.drawImage(img, sx, sy, sw, sh);
      ctx.restore();
      // border
      ctx.save();
      ctx.strokeStyle = '#f8bbd0';
      ctx.lineWidth = 1;
      if(shape==='circle'){
        ctx.beginPath();ctx.arc(x+w/2,y+h/2,Math.min(w,h)/2,0,Math.PI*2);ctx.stroke();
      } else if(shape==='rounded'){
        const r=Math.min(w,h)*0.12;
        ctx.beginPath();
        ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
        ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
        ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
        ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
        ctx.closePath();ctx.stroke();
      } else {
        ctx.strokeRect(x,y,w,h);
        // cut guides
        ctx.fillStyle='#dba0be';
        [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([dx,dy])=>{
          ctx.beginPath();ctx.arc(dx,dy,2,0,Math.PI*2);ctx.fill();
        });
      }
      ctx.restore();
      resolve();
    };
    img.onerror = resolve;
    img.src = dataUrl;
  });
}

// --- sticker overlay for drag-on-canvas ---
function renderStickerOverlay(){
  // we handle reorder via thumb list; overlay just shows hover labels
  const overlay = document.getElementById('stickerOverlay');
  overlay.innerHTML = '';
  const page = layout[currentPage] || [];
  page.forEach(slot=>{
    const div = document.createElement('div');
    div.style.cssText = `position:absolute;left:${slot.x*SCALE}px;top:${slot.y*SCALE}px;width:${slot.w*SCALE}px;height:${slot.h*SCALE}px;cursor:pointer;border-radius:4px`;
    div.title = `sticker ${slot.imgIdx+1} — arrastra en la lista de la izquierda para reordenar`;
    div.addEventListener('mouseenter', ()=>{ div.style.outline='2.5px solid #e91e8c'; });
    div.addEventListener('mouseleave', ()=>{ div.style.outline='none'; });
    overlay.appendChild(div);
  });
}

// --- upscale ---
function needsUpscale(dataUrl){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>resolve(img.naturalWidth<500||img.naturalHeight<500);
    img.src=dataUrl;
  });
}
function upscaleImage(dataUrl, scale=3){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.width=img.naturalWidth*scale;c.height=img.naturalHeight*scale;
      const ctx=c.getContext('2d');
      ctx.imageSmoothingEnabled=true;ctx.imageSmoothingQuality='high';
      ctx.drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL('image/png',1));
    };
    img.src=dataUrl;
  });
}

// --- process image for PDF (upscale + shape clip) ---
async function processImage(dataUrl, shape, doUpscale){
  let url = dataUrl;
  let upscaled = false;
  if(doUpscale && await needsUpscale(url)){
    url = await upscaleImage(url,3);
    upscaled = true;
  }
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const size=Math.max(img.naturalWidth,img.naturalHeight);
      const c=document.createElement('canvas');
      c.width=size;c.height=size;
      const ctx=c.getContext('2d');
      ctx.clearRect(0,0,size,size);
      // clip
      ctx.beginPath();
      if(shape==='circle'){
        ctx.arc(size/2,size/2,size/2,0,Math.PI*2);
      } else if(shape==='rounded'){
        const r=size*0.12;
        ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
        ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
        ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
        ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
      } else {
        ctx.rect(0,0,size,size);
      }
      ctx.closePath();ctx.clip();
      // center-crop draw
      const iw=img.naturalWidth,ih=img.naturalHeight;
      const sc=Math.max(size/iw,size/ih);
      const sw=iw*sc,sh=ih*sc;
      ctx.drawImage(img,(size-sw)/2,(size-sh)/2,sw,sh);
      resolve({url:c.toDataURL('image/png',1), upscaled});
    };
    img.src=url;
  });
}

function setProgress(pct, lbl){
  document.getElementById('progWrap').style.display='block';
  document.getElementById('progLbl').style.display='block';
  document.getElementById('progBar').style.width=pct+'%';
  document.getElementById('progLbl').textContent=lbl;
}

// --- generate PDF ---
async function generatePDF(){
  if(!images.length){showToast('primero sube imágenes ♡');return}

  const btn=document.getElementById('genBtn');
  btn.disabled=true;btn.textContent='⏳ generando...';
  computeLayout();

  const pageSizeKey=document.getElementById('pageSize').value;
  const shape=document.getElementById('shape').value;
  const bgColor=document.getElementById('bgColor').value;
  const doUpscale=document.getElementById('upscaleToggle').checked;
  const [pgW,pgH]=PAGE_SIZES[pageSizeKey];

  // Process all images
  const processed=[];
  for(let i=0;i<images.length;i++){
    setProgress(5+(i/images.length)*50,`procesando imagen ${i+1} de ${images.length}...`);
    const {url,upscaled}=await processImage(images[i].dataUrl, shape, doUpscale);
    processed.push(url);
    images[i].upscaled=upscaled||images[i].upscaled;
  }
  renderThumbs();

  setProgress(55,'construyendo PDF...');

  const fmt = pageSizeKey==='letter' ? [pgW,pgH] : pageSizeKey;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:fmt});

  for(let p=0;p<totalPages;p++){
    if(p>0) doc.addPage();
    // background
    const bg=BG_COLORS[bgColor];
    doc.setFillColor(bg);
    doc.rect(0,0,pgW,pgH,'F');

    for(const slot of layout[p]){
      const url=processed[slot.imgIdx];
      if(!url) continue;
      try{
        doc.addImage(url,'PNG',slot.x,slot.y,slot.w,slot.h,'','FAST');
      } catch(e){ /* skip bad image */ }
      // border
      doc.setDrawColor('#f8bbd0');
      doc.setLineWidth(0.3);
      if(shape==='rounded'){
        doc.roundedRect(slot.x,slot.y,slot.w,slot.h,3,3,'S');
      } else if(shape==='square'){
        doc.rect(slot.x,slot.y,slot.w,slot.h,'S');
        // cut guide dots
        doc.setFillColor('#e8aac8');
        [[slot.x,slot.y],[slot.x+slot.w,slot.y],[slot.x,slot.y+slot.h],[slot.x+slot.w,slot.y+slot.h]].forEach(([dx,dy])=>{
          doc.circle(dx,dy,0.6,'F');
        });
      }
    }
    // footer
    doc.setFont('helvetica','normal');
    doc.setFontSize(6);
    doc.setTextColor(220,160,185);
    doc.text(`sticker sheet  •  pag ${p+1} / ${totalPages}`, pgW/2, pgH-3, {align:'center'});
    setProgress(55+((p+1)/totalPages)*40,`página ${p+1} de ${totalPages}...`);
  }

  setProgress(100,'¡descargando! ✿');
  setTimeout(()=>{
    doc.save('sticker-sheet.pdf');
    btn.disabled=false;btn.innerHTML='🌸 descargar PDF';
    document.getElementById('progWrap').style.display='none';
    document.getElementById('progLbl').style.display='none';
    showToast('¡PDF listo! ✿ feliz impresión ♡');
  },300);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// Initial preview
refreshPreview();
window.addEventListener('resize', ()=>refreshPreview());
</script>
