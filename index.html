<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>sticker sheet maker ✿</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --pink-0: #fff0f7;
  --pink-1: #fce4ec;
  --pink-2: #f8bbd0;
  --pink-3: #f48fb1;
  --pink-4: #e91e8c;
  --pink-5: #c2185b;
  --pink-6: #880e4f;
  --lilac: #f3e5f5;
  --lilac-2: #ce93d8;
  --lilac-3: #9c27b0;
  --cream: #fffde7;
}

body {
  font-family: 'Nunito', sans-serif;
  background: #fce4ec;
  background-image:
    radial-gradient(circle at 15% 20%, #fce4ec 0%, transparent 50%),
    radial-gradient(circle at 85% 80%, #f3e5f5 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, #fff0f7 0%, transparent 60%);
  min-height: 100vh;
  color: #5c1a3a;
}

header {
  text-align: center;
  padding: 3rem 1rem 2rem;
}
header h1 {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(2rem, 5vw, 3.2rem);
  color: var(--pink-5);
  letter-spacing: 1px;
  line-height: 1.1;
}
header p {
  color: var(--pink-4);
  font-size: 15px;
  font-weight: 600;
  margin-top: 0.4rem;
}

.deco { color: var(--pink-3); }

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 1.25rem 4rem;
}

/* Upload zone */
.upload-zone {
  border: 2.5px dashed var(--pink-3);
  border-radius: 24px;
  background: var(--pink-0);
  padding: 3rem 2rem;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
  margin-bottom: 2rem;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--pink-4);
  background: #fff0f7;
}
.upload-zone input[type=file] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}
.upload-icon {
  font-size: 3rem;
  margin-bottom: 0.75rem;
  display: block;
  color: var(--pink-3);
}
.upload-zone h2 {
  font-size: 18px;
  font-weight: 800;
  color: var(--pink-5);
  margin-bottom: 0.4rem;
}
.upload-zone p {
  font-size: 13px;
  color: var(--pink-3);
  font-weight: 600;
}

/* Settings bar */
.settings-bar {
  background: var(--pink-0);
  border: 1.5px solid var(--pink-2);
  border-radius: 20px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.5rem;
  display: flex;
  flex-wrap: wrap;
  gap: 1rem 2rem;
  align-items: center;
}
.setting-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.setting-group label {
  font-size: 11px;
  font-weight: 800;
  color: var(--pink-4);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.setting-group select,
.setting-group input[type=range] {
  appearance: none;
  -webkit-appearance: none;
  background: #fff0f7;
  border: 1.5px solid var(--pink-2);
  border-radius: 50px;
  padding: 6px 14px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 13px;
  color: var(--pink-5);
  cursor: pointer;
  outline: none;
  min-width: 140px;
}
.setting-group select:focus { border-color: var(--pink-4); }
.range-row { display: flex; align-items: center; gap: 8px; }
.range-row span {
  font-size: 13px;
  font-weight: 800;
  color: var(--pink-5);
  min-width: 28px;
  text-align: right;
}
input[type=range] {
  padding: 0 !important;
  width: 120px;
  height: 6px;
  border-radius: 50px;
  cursor: pointer;
  accent-color: var(--pink-4);
}

.toggle-group {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: auto;
  padding-bottom: 2px;
}
.toggle-group label {
  font-size: 13px;
  font-weight: 700;
  color: var(--pink-5);
  cursor: pointer;
  text-transform: none;
  letter-spacing: 0;
}
.toggle {
  position: relative;
  width: 40px;
  height: 22px;
}
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-slider {
  position: absolute;
  inset: 0;
  background: var(--pink-2);
  border-radius: 50px;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  left: 3px;
  top: 3px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle input:checked + .toggle-slider { background: var(--pink-4); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

/* Grid preview */
.grid-section {
  background: var(--pink-0);
  border: 1.5px solid var(--pink-2);
  border-radius: 20px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}
.grid-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
}
.grid-header h3 {
  font-size: 15px;
  font-weight: 800;
  color: var(--pink-5);
}
.count-badge {
  background: var(--pink-2);
  color: var(--pink-5);
  font-size: 12px;
  font-weight: 800;
  padding: 3px 12px;
  border-radius: 50px;
}

.sticker-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 12px;
}
.sticker-item {
  position: relative;
  background: white;
  border-radius: 16px;
  border: 2px solid var(--pink-2);
  overflow: hidden;
  aspect-ratio: 1;
  transition: transform 0.15s;
}
.sticker-item:hover { transform: scale(1.03); }
.sticker-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.sticker-item .remove-btn {
  position: absolute;
  top: 5px;
  right: 5px;
  background: var(--pink-4);
  color: white;
  border: none;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.15s;
  line-height: 1;
  font-weight: 800;
}
.sticker-item:hover .remove-btn { opacity: 1; }
.sticker-item .upscale-badge {
  position: absolute;
  bottom: 5px;
  left: 5px;
  background: #9c27b0cc;
  color: white;
  font-size: 9px;
  font-weight: 800;
  padding: 2px 7px;
  border-radius: 50px;
  letter-spacing: 0.5px;
}

.empty-grid {
  text-align: center;
  padding: 2rem;
  color: var(--pink-3);
  font-size: 14px;
  font-weight: 600;
}

/* Generate button */
.generate-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  background: linear-gradient(135deg, var(--pink-4) 0%, var(--pink-5) 100%);
  color: white;
  border: none;
  border-radius: 50px;
  padding: 16px 2rem;
  font-family: 'Fredoka One', cursive;
  font-size: 20px;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 20px #e91e8c44;
}
.generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px #e91e8c55; }
.generate-btn:active { transform: scale(0.98); }
.generate-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* Progress */
.progress-wrap {
  display: none;
  margin-top: 1rem;
  background: var(--pink-0);
  border: 1.5px solid var(--pink-2);
  border-radius: 50px;
  overflow: hidden;
  height: 12px;
}
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--pink-3), var(--pink-4));
  border-radius: 50px;
  transition: width 0.3s;
  width: 0%;
}
.progress-label {
  display: none;
  text-align: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--pink-4);
  margin-top: 6px;
}

/* toast */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(6px);
  background: var(--pink-5);
  color: white;
  padding: 10px 24px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 700;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* page deco dots */
.page-dots {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}
.dot {
  position: absolute;
  border-radius: 50%;
  opacity: 0.12;
}
</style>
</head>
<body>

<div class="page-dots" aria-hidden="true">
  <div class="dot" style="width:300px;height:300px;background:#f48fb1;top:-80px;right:-60px;"></div>
  <div class="dot" style="width:200px;height:200px;background:#ce93d8;bottom:10%;left:-60px;"></div>
  <div class="dot" style="width:150px;height:150px;background:#f8bbd0;top:40%;right:5%;"></div>
</div>

<div style="position:relative;z-index:1;">
<header>
  <h1>✿ sticker sheet maker ✿</h1>
  <p>sube tus imágenes favoritas y genera una hoja de stickers para imprimir ♡</p>
</header>

<div class="container">

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*" multiple />
    <span class="upload-icon">🌸</span>
    <h2>arrastra tus imágenes aquí</h2>
    <p>o haz click para seleccionar • PNG, JPG, WEBP • múltiples imágenes</p>
  </div>

  <!-- Settings -->
  <div class="settings-bar">
    <div class="setting-group">
      <label>tamaño de página</label>
      <select id="pageSize">
        <option value="a4">A4 (21 × 29.7 cm)</option>
        <option value="letter">Carta (21.6 × 27.9 cm)</option>
        <option value="a5">A5 (14.8 × 21 cm)</option>
      </select>
    </div>
    <div class="setting-group">
      <label>stickers por fila</label>
      <select id="cols">
        <option value="3">3 por fila</option>
        <option value="4" selected>4 por fila</option>
        <option value="5">5 por fila</option>
        <option value="2">2 por fila (grandes)</option>
      </select>
    </div>
    <div class="setting-group">
      <label>forma del sticker</label>
      <select id="shape">
        <option value="square">cuadrado</option>
        <option value="circle">círculo</option>
        <option value="rounded">redondeado</option>
      </select>
    </div>
    <div class="setting-group">
      <label>fondo del PDF</label>
      <select id="bgColor">
        <option value="white">blanco</option>
        <option value="pink">rosita suave ♡</option>
        <option value="cream">crema</option>
      </select>
    </div>
    <div class="setting-group">
      <label>margen entre stickers</label>
      <div class="range-row">
        <input type="range" id="gap" min="2" max="15" value="6" step="1" />
        <span id="gapVal">6</span>
      </div>
    </div>
    <div class="toggle-group">
      <label class="toggle">
        <input type="checkbox" id="upscaleToggle" checked />
        <span class="toggle-slider"></span>
      </label>
      <label for="upscaleToggle">mejorar calidad ✦</label>
    </div>
  </div>

  <!-- Grid preview -->
  <div class="grid-section">
    <div class="grid-header">
      <h3>tus stickers</h3>
      <span class="count-badge" id="countBadge">0 imágenes</span>
    </div>
    <div class="sticker-grid" id="stickerGrid">
      <div class="empty-grid" id="emptyMsg">¡aún no hay stickers! sube tus imágenes favoritas 🌷</div>
    </div>
  </div>

  <!-- Generate -->
  <button class="generate-btn" id="genBtn" onclick="generatePDF()">
    <span>🌸</span> generar sticker sheet PDF
  </button>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <p class="progress-label" id="progressLabel"></p>

</div>
</div>

<div class="toast" id="toast"></div>

<script>
const { jsPDF } = window.jspdf;

let images = []; // {id, file, dataUrl, upscaled}

/* ---- drag & drop ---- */
const zone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('drag-over');
  handleFiles([...e.dataTransfer.files]);
});
fileInput.addEventListener('change', () => handleFiles([...fileInput.files]));

document.getElementById('gap').addEventListener('input', function() {
  document.getElementById('gapVal').textContent = this.value;
});

/* ---- file handling ---- */
function handleFiles(files) {
  const allowed = files.filter(f => f.type.startsWith('image/'));
  if (!allowed.length) { showToast('solo se permiten imágenes ♡'); return; }
  allowed.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const id = Date.now() + Math.random();
      images.push({ id, file, dataUrl: e.target.result, upscaled: false });
      renderGrid();
    };
    reader.readAsDataURL(file);
  });
}

/* ---- render grid ---- */
function renderGrid() {
  const grid = document.getElementById('stickerGrid');
  const empty = document.getElementById('emptyMsg');
  document.getElementById('countBadge').textContent = images.length + ' imagen' + (images.length !== 1 ? 'es' : '');
  if (!images.length) {
    grid.innerHTML = '<div class="empty-grid" id="emptyMsg">¡aún no hay stickers! sube tus imágenes favoritas 🌷</div>';
    return;
  }
  grid.innerHTML = images.map(img => `
    <div class="sticker-item" id="item-${img.id}">
      <img src="${img.dataUrl}" alt="sticker" loading="lazy" />
      ${img.upscaled ? '<span class="upscale-badge">✦ HD</span>' : ''}
      <button class="remove-btn" onclick="removeImage('${img.id}')" title="eliminar">✕</button>
    </div>
  `).join('');
}

function removeImage(id) {
  images = images.filter(i => i.id != id);
  renderGrid();
}

/* ---- upscale via Canvas ---- */
function upscaleImage(dataUrl, scale = 2) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const w = img.naturalWidth;
      const h = img.naturalHeight;
      const targetW = w * scale;
      const targetH = h * scale;
      canvas.width = targetW;
      canvas.height = targetH;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, targetW, targetH);
      resolve(canvas.toDataURL('image/png', 1.0));
    };
    img.src = dataUrl;
  });
}

function needsUpscale(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      resolve(img.naturalWidth < 400 || img.naturalHeight < 400);
    };
    img.src = dataUrl;
  });
}

/* ---- progress ---- */
function setProgress(pct, label) {
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressLabel').style.display = 'block';
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = label;
}

/* ---- PDF generation ---- */
async function generatePDF() {
  if (!images.length) { showToast('primero sube algunas imágenes ♡'); return; }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> generando...';
  setProgress(5, 'preparando imágenes...');

  const cols = parseInt(document.getElementById('cols').value);
  const pageSizeKey = document.getElementById('pageSize').value;
  const shape = document.getElementById('shape').value;
  const bgColor = document.getElementById('bgColor').value;
  const gap = parseInt(document.getElementById('gap').value);
  const doUpscale = document.getElementById('upscaleToggle').checked;

  const pageSizes = {
    a4: [210, 297],
    letter: [215.9, 279.4],
    a5: [148, 210]
  };
  const [pgW, pgH] = pageSizes[pageSizeKey];

  const margin = 12;
  const availW = pgW - margin * 2;
  const stickerSize = (availW - gap * (cols - 1)) / cols;
  const rows = Math.floor((pgH - margin * 2 + gap) / (stickerSize + gap));
  const perPage = rows * cols;

  /* upscale if needed */
  let processedImages = [...images];
  if (doUpscale) {
    for (let i = 0; i < processedImages.length; i++) {
      setProgress(5 + (i / processedImages.length) * 40, `mejorando imagen ${i + 1} de ${processedImages.length}...`);
      const needs = await needsUpscale(processedImages[i].dataUrl);
      if (needs) {
        processedImages[i].dataUrl = await upscaleImage(processedImages[i].dataUrl, 3);
        processedImages[i].upscaled = true;
      }
    }
    images = processedImages;
    renderGrid();
  }

  setProgress(50, 'construyendo PDF...');

  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: pageSizeKey === 'letter' ? [pgW, pgH] : pageSizeKey });
  const totalPages = Math.ceil(processedImages.length / perPage);

  const bgHex = { white: '#ffffff', pink: '#fce4ec', cream: '#fffde7' };

  for (let page = 0; page < totalPages; page++) {
    if (page > 0) doc.addPage();

    /* background */
    doc.setFillColor(bgHex[bgColor]);
    doc.rect(0, 0, pgW, pgH, 'F');

    /* subtle watermark text */
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(6);
    doc.setTextColor(220, 170, 190);
    doc.text('✿ sticker sheet ✿', pgW / 2, pgH - 4, { align: 'center' });

    const start = page * perPage;
    const end = Math.min(start + perPage, processedImages.length);

    for (let i = start; i < end; i++) {
      const idx = i - start;
      const col = idx % cols;
      const row = Math.floor(idx / cols);
      const x = margin + col * (stickerSize + gap);
      const y = margin + row * (stickerSize + gap);

      try {
        /* clip shape */
        if (shape === 'circle') {
          const cx = x + stickerSize / 2;
          const cy = y + stickerSize / 2;
          const r = stickerSize / 2;
          /* draw circle clip by drawing image in circle */
          doc.saveGraphicsState && doc.saveGraphicsState();
          /* jsPDF circle clip workaround: use clipping path */
          addCircleClippedImage(doc, processedImages[i].dataUrl, x, y, stickerSize, cx, cy, r);
        } else if (shape === 'rounded') {
          doc.roundedRect(x, y, stickerSize, stickerSize, 6, 6, 'S');
          doc.addImage(processedImages[i].dataUrl, 'PNG', x, y, stickerSize, stickerSize, '', 'FAST');
          doc.setDrawColor(240, 180, 210);
          doc.setLineWidth(0.4);
          doc.roundedRect(x, y, stickerSize, stickerSize, 6, 6, 'S');
        } else {
          doc.addImage(processedImages[i].dataUrl, 'PNG', x, y, stickerSize, stickerSize, '', 'FAST');
          doc.setDrawColor(240, 180, 210);
          doc.setLineWidth(0.4);
          doc.rect(x, y, stickerSize, stickerSize, 'S');
        }
      } catch(e) {
        /* fallback: pink placeholder */
        doc.setFillColor('#f8bbd0');
        doc.rect(x, y, stickerSize, stickerSize, 'F');
      }
    }

    setProgress(50 + ((page + 1) / totalPages) * 45, `página ${page + 1} de ${totalPages}...`);
  }

  setProgress(100, '¡listo! descargando... ✿');
  setTimeout(() => {
    doc.save('sticker-sheet.pdf');
    btn.disabled = false;
    btn.innerHTML = '<span>🌸</span> generar sticker sheet PDF';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('progressLabel').style.display = 'none';
    showToast('¡PDF descargado! ✿ a imprimir ♡');
  }, 400);
}

function addCircleClippedImage(doc, dataUrl, x, y, size, cx, cy, r) {
  /* jsPDF doesn't natively support clipping, so we render a circle mask approach:
     draw the image, then overdraw the corners with background color circles.
     For a clean circle we use canvas pre-processing. */
  const canvas = document.createElement('canvas');
  const px = Math.round(size * 10);
  canvas.width = px;
  canvas.height = px;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, px, px);
  ctx.beginPath();
  ctx.arc(px / 2, px / 2, px / 2, 0, Math.PI * 2);
  ctx.closePath();
  ctx.clip();
  const img = new Image();
  img.src = dataUrl;
  ctx.drawImage(img, 0, 0, px, px);
  const circleData = canvas.toDataURL('image/png');
  doc.addImage(circleData, 'PNG', x, y, size, size, '', 'FAST');
}

/* pre-process circle images before PDF (since jsPDF drawImage is sync) */
async function generatePDF() {
  if (!images.length) { showToast('primero sube algunas imágenes ♡'); return; }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> generando...';
  setProgress(5, 'preparando imágenes...');

  const cols = parseInt(document.getElementById('cols').value);
  const pageSizeKey = document.getElementById('pageSize').value;
  const shape = document.getElementById('shape').value;
  const bgColor = document.getElementById('bgColor').value;
  const gap = parseInt(document.getElementById('gap').value);
  const doUpscale = document.getElementById('upscaleToggle').checked;

  const pageSizes = { a4: [210, 297], letter: [215.9, 279.4], a5: [148, 210] };
  const [pgW, pgH] = pageSizes[pageSizeKey];
  const margin = 12;
  const availW = pgW - margin * 2;
  const stickerSize = (availW - gap * (cols - 1)) / cols;
  const rows = Math.floor((pgH - margin * 2 + gap) / (stickerSize + gap));
  const perPage = rows * cols;

  let processedImages = images.map(i => ({ ...i }));

  /* Step 1: upscale small images */
  for (let i = 0; i < processedImages.length; i++) {
    setProgress(5 + (i / processedImages.length) * 35, `mejorando imagen ${i + 1} de ${processedImages.length}...`);
    if (doUpscale) {
      const needs = await needsUpscale(processedImages[i].dataUrl);
      if (needs) {
        processedImages[i].dataUrl = await upscaleImage(processedImages[i].dataUrl, 3);
        processedImages[i].upscaled = true;
      }
    }
    /* Pre-process circle shape using canvas */
    processedImages[i].finalUrl = await preprocessShape(processedImages[i].dataUrl, shape);
  }

  /* update display badges */
  images = images.map((img, i) => ({ ...img, upscaled: processedImages[i].upscaled || img.upscaled }));
  renderGrid();

  setProgress(45, 'construyendo PDF...');

  const jspdfFormat = pageSizeKey === 'letter' ? [pgW, pgH] : pageSizeKey;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: jspdfFormat });
  const totalPages = Math.ceil(processedImages.length / perPage);
  const bgHex = { white: '#ffffff', pink: '#fce4ec', cream: '#fffde7' };

  for (let page = 0; page < totalPages; page++) {
    if (page > 0) doc.addPage();

    doc.setFillColor(bgHex[bgColor]);
    doc.rect(0, 0, pgW, pgH, 'F');

    /* subtle footer */
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(6);
    doc.setTextColor(220, 170, 190);
    doc.text('sticker sheet  •  pag ' + (page + 1) + ' / ' + totalPages, pgW / 2, pgH - 4, { align: 'center' });

    const start = page * perPage;
    const end = Math.min(start + perPage, processedImages.length);

    for (let i = start; i < end; i++) {
      const idx = i - start;
      const col = idx % cols;
      const row = Math.floor(idx / cols);
      const x = margin + col * (stickerSize + gap);
      const y = margin + row * (stickerSize + gap);

      try {
        doc.addImage(processedImages[i].finalUrl, 'PNG', x, y, stickerSize, stickerSize, '', 'FAST');

        /* border */
        doc.setDrawColor(240, 180, 210);
        doc.setLineWidth(0.3);
        if (shape === 'rounded') {
          doc.roundedRect(x, y, stickerSize, stickerSize, 5, 5, 'S');
        } else if (shape === 'square') {
          doc.rect(x, y, stickerSize, stickerSize, 'S');
        }
        /* circle: no border needed, canvas already clipped */

        /* cut guide dot */
        if (shape !== 'circle') {
          doc.setFillColor(200, 140, 170);
          const dotR = 0.7;
          [[x, y],[x+stickerSize, y],[x, y+stickerSize],[x+stickerSize, y+stickerSize]].forEach(([dx, dy]) => {
            doc.circle(dx, dy, dotR, 'F');
          });
        }
      } catch(e) {
        doc.setFillColor('#f8bbd0');
        doc.rect(x, y, stickerSize, stickerSize, 'F');
      }
    }
    setProgress(45 + ((page + 1) / totalPages) * 50, `página ${page + 1} de ${totalPages}...`);
  }

  setProgress(100, '¡listo! descargando ✿');
  setTimeout(() => {
    doc.save('sticker-sheet.pdf');
    btn.disabled = false;
    btn.innerHTML = '<span>🌸</span> generar sticker sheet PDF';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('progressLabel').style.display = 'none';
    showToast('¡PDF listo! ✿ feliz impresión ♡');
  }, 300);
}

async function preprocessShape(dataUrl, shape) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const size = Math.max(img.naturalWidth, img.naturalHeight);
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, size, size);

      if (shape === 'circle') {
        ctx.beginPath();
        ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
        ctx.closePath();
        ctx.clip();
      } else if (shape === 'rounded') {
        const r = size * 0.12;
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(size - r, 0);
        ctx.quadraticCurveTo(size, 0, size, r);
        ctx.lineTo(size, size - r);
        ctx.quadraticCurveTo(size, size, size - r, size);
        ctx.lineTo(r, size);
        ctx.quadraticCurveTo(0, size, 0, size - r);
        ctx.lineTo(0, r);
        ctx.quadraticCurveTo(0, 0, r, 0);
        ctx.closePath();
        ctx.clip();
      }

      /* center crop */
      const sw = Math.min(img.naturalWidth, img.naturalHeight);
      const sx = (img.naturalWidth - sw) / 2;
      const sy = (img.naturalHeight - sw) / 2;
      ctx.drawImage(img, sx, sy, sw, sw, 0, 0, size, size);
      resolve(canvas.toDataURL('image/png', 1.0));
    };
    img.src = dataUrl;
  });
}

/* ---- toast ---- */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
